[config]
schemaVersion = "0.0.1"

[general]
repository = "https://thunderstore.io"

[package]
namespace = "LyricLy"
name = "BetterDistanceEstimation"
description = "Makes the distance estimation displayed on the power bar more accurate."
websiteUrl = "https://github.com/LyricLy/BetterDistanceEstimation"
containsNsfwContent = false

[package.dependencies]
BepInEx-BepInExPack = "5.4.2304"

[build]
icon = "../../icon.png"
readme = "../../README.md"
outdir = "../../artifacts/thunderstore/"

[[build.copy]]
source = "../../artifacts/bin/BetterDistanceEstimation/release/com.github.LyricLy.BetterDistanceEstimation.dll"
target = "plugins/"

[[build.copy]]
source = "../../LICENSE"
target = "/"

[publish]
communities = [ "super-battle-golf" ]

[publish.categories]
super-battle-golf = [ "mods" ]
